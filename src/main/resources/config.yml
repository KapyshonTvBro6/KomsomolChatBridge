# KomsomolChatBridge config.
# Значения PASTE_... являются примерами и считаются пустыми, пока вы не замените их на свои.

general:
  # Включает подробные сообщения в консоли сервера.
  debug: false

  # Язык сообщений плагина.
  language: "ru"

  # Название сервера в системных сообщениях.
  server_name: "KomsomolCraft"

  # Не пересылать пустые сообщения.
  ignore_empty_messages: true

  # Максимальная длина сообщения для пересылки.
  max_message_length: 500

  # Убирать Minecraft-цвета перед отправкой во внешние чаты.
  strip_colors_from_external: true

  # Разрешает ссылки в пересылаемых сообщениях.
  allow_links: true

minecraft:
  # Включает Minecraft-часть bridge.
  enabled: true

  # Пересылает обычный чат игроков.
  relay_chat: true

  # Отменяет оригинальное сообщение в Minecraft-чате после пересылки.
  cancel_original_chat: false

  # Пересылает вход и выход игроков.
  relay_join_leave: true

  # Пересылает сообщения о смерти.
  relay_death: true

  # Пересылает достижения игроков.
  relay_advancements: false

  # Показывает внешний чат только игрокам с permission_receive_external.
  private_receive_mode: false

  # Формат Discord -> Minecraft по стилю DiscordSRV.
  format_from_discord: "[<aqua>Discord</aqua>] {username} » {message}"

  # Формат Telegram -> Minecraft по стилю tgbridge.
  format_from_telegram: "<aqua>[TG] {username}:</aqua> {message}"

  # Запасной формат системных сообщений в Minecraft.
  format_system: "<gold>{message}</gold>"

  # Системные сообщения для Minecraft, если bridge отправляет их в игру.
  system_messages:
    server_start: "<green>Сервер {server} запущен.</green>"
    server_stop: "<red>Сервер {server} остановлен.</red>"
    join: "<green>{player} зашёл на сервер.</green>"
    quit: "<red>{player} вышел с сервера.</red>"
    death: "<gray>{death_message}</gray>"
    advancement: "<gold>{player} получил достижение {advancement}.</gold>"

  # Права можно оставить пустыми строками, если проверки не нужны.
  permission_receive_external: "komsomolbridge.receive"
  permission_send_to_bridge: "komsomolbridge.send"
  permission_antispam_bypass: "komsomolbridge.admin"

discord:
  # Включает Discord-часть bridge.
  enabled: true

  # Токен Discord-бота из Developer Portal.
  bot_token: "PASTE_DISCORD_BOT_TOKEN_HERE"

  # ID основного Discord-канала для чата.
  channel_id: "PASTE_DISCORD_CHAT_CHANNEL_ID_HERE"

  # ID Discord-канала консоли; сообщения там выполняются как команды сервера.
  console_channel_id: "PASTE_DISCORD_CONSOLE_CHANNEL_ID_HERE"

  # Ссылка приглашения, которую показывает /bridge discord.
  discord_invite_link: "https://discord.gg/your-invite"

  # Игнорирует сообщения других ботов.
  ignore_bots: true

  # Разрешает выполнять команды из console_channel_id.
  console_execute_commands: true

  # Префикс команд в console_channel_id; пусто = выполнять каждое сообщение.
  console_command_prefix: ""

  # Отправляет Minecraft -> Discord через webhook от имени игрока.
  use_webhook_for_minecraft_messages: true

  # Оформляет вход, выход, смерть и достижения embed-карточками.
  use_embeds_for_player_events: true

  # Discord webhook URL для сообщений Minecraft -> Discord.
  webhook_url: "https://discord.com/api/webhooks/WEBHOOK_ID/WEBHOOK_TOKEN"

  # Аватар webhook-сообщений Minecraft.
  webhook_avatar_url: "https://mc-heads.net/avatar/{player}/128"

  # Аватар embed-карточек игровых событий.
  system_embed_avatar_url: "https://mc-heads.net/avatar/{player}/32"

  # Текст webhook-сообщения Minecraft -> Discord.
  webhook_message_format: "{message}"

  # Имя автора webhook-сообщения Minecraft -> Discord.
  webhook_username_format: "{player}"

  # Формат Minecraft -> Discord по стилю DiscordSRV.
  format_from_minecraft: "{player} » {message}"

  # Формат Telegram -> Discord.
  format_from_telegram: "TG | **{username}** » {message}"

  # Запасной формат системных сообщений в Discord.
  format_system: "{message}"

  # Системные сообщения Discord по стилю DiscordSRV.
  system_messages:
    server_start: ":white_check_mark: **Server has started**"
    server_stop: ":octagonal_sign: **Server has stopped**"
    join: "{player} вошёл на сервер"
    quit: "{player} вышел с сервера"
    death: "{death_message}"
    advancement: "{player} получил достижение {advancement}"

  # Добавляет ссылки на вложения Discord к пересылаемому тексту.
  relay_attachments: false

telegram:
  # Включает Telegram-часть bridge.
  enabled: true

  # Токен Telegram-бота от BotFather.
  bot_token: "PASTE_TELEGRAM_BOT_TOKEN_HERE"

  # ID Telegram-чата или группы.
  chat_id: "PASTE_TELEGRAM_CHAT_ID_HERE"

  # LONG_POLLING проще для локального сервера, WEBHOOK требует публичный HTTPS.
  mode: "LONG_POLLING"

  # HTML нужен для tgbridge-стиля с тегами <b> и <i>.
  parse_mode: "HTML"

  webhook:
    # Включается только для telegram.mode = WEBHOOK.
    enabled: false

    # Публичный HTTPS URL для updates Telegram.
    public_url: "https://example.com/tg/webhook"

    # Локальный адрес и порт webhook-сервера.
    listen_host: "0.0.0.0"
    listen_port: 8090

  # Игнорирует сообщения Telegram-ботов.
  ignore_bots: true

  # Пересылает Telegram-сообщения, которые начинаются с "/".
  relay_commands: false

  # Формат Minecraft -> Telegram по стилю tgbridge.
  format_from_minecraft: "<b>[💬 {player}]</b> {message}"

  # Формат Discord -> Telegram.
  format_from_discord: "<b>[💬 DS | {username}]</b> {message}"

  # Запасной формат системных сообщений в Telegram.
  format_system: "{message}"

  # Системные сообщения Telegram по стилю tgbridge.
  system_messages:
    server_start: "✅ <b>Сервер {server} запущен!</b>"
    server_stop: "❌ <b>Сервер {server} остановлен!</b>"
    join: "🥳 <b>{player} зашёл на {server}</b>"
    quit: "😕 <b>{player} покинул {server}</b>"
    death: "☠️ <b>{death_message}</b>"
    advancement: "🏆 <b>{player} получил достижение «{advancement}»</b>"

anti_spam:
  # Включает ограничение частоты сообщений.
  enabled: true

  # Сколько сообщений пользователь может отправить за 10 секунд.
  max_messages_per_10_seconds: 5

  # Сколько секунд держать cooldown после лимита.
  cooldown_seconds: 3

  # Одинаковые сообщения от одного автора блокируются в этом окне.
  duplicate_window_seconds: 15

loop_protection:
  # Сколько последних сообщений хранить для защиты от циклов.
  cache_size: 1000

  # Через сколько минут забывать старые сообщения.
  cache_ttl_minutes: 30

filters:
  # Слова, при наличии которых сообщение блокируется.
  blacklist_words: []

  # Java regex-выражения, при совпадении с которыми сообщение блокируется.
  blacklist_regex: []

  # Дополнительный переключатель ссылок для фильтра.
  allow_links: true

  # Экранирует Discord Markdown в пользовательском тексте.
  escape_markdown: true

system_events:
  # Пересылать вход игрока.
  join: true

  # Пересылать выход игрока.
  quit: true

  # Пересылать смерть игрока.
  death: true

  # Пересылать достижение игрока.
  advancement: false

  # Пересылать запуск сервера.
  server_start: true

  # Пересылать остановку сервера.
  server_stop: true

storage:
  # Сейчас поддерживается sqlite.
  type: "sqlite"

  # Путь к SQLite-файлу.
  sqlite_file: "plugins/KomsomolChatBridge/chatbridge.db"
